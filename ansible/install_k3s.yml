---
- name: Install K3s Master
  hosts: master
  become: yes
  tasks:
    - name: Download and install K3s
      shell: curl -sfL https://get.k3s.io | sh -
      register: k3s_install

    - name: Get K3s token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Set token fact
      set_fact:
        k3s_token: "{{ node_token.content | b64decode | trim }}"

- name: Install K3s Worker
  hosts: worker
  become: yes
  tasks:
    - name: Install K3s agent and join cluster
      shell: "curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars['master-node'].ansible_host }}:6443 K3S_TOKEN={{ hostvars['master-node'].k3s_token }} sh -"
