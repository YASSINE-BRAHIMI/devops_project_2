name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: |
          cd app
          pytest test_app.py

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ CORRECTION PRINCIPALE : base64 -d pour décoder le secret
      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # ✅ Vérification que le décodage a bien fonctionné
      - name: Vérifier le kubeconfig
        run: |
          echo "=== Taille et nombre de lignes ==="
          wc -c ~/.kube/config
          wc -l ~/.kube/config

          echo "=== Première ligne (doit être : apiVersion: v1) ==="
          head -1 ~/.kube/config

          echo "=== Adresse du serveur (doit être IP publique EC2) ==="
          grep "server:" ~/.kube/config

      # ✅ Vérification que le cluster EC2 est joignable
      - name: Tester la connectivité cluster
        run: |
          echo "=== Infos cluster ==="
          kubectl cluster-info --request-timeout=10s

          echo "=== Liste des noeuds ==="
          kubectl get nodes --request-timeout=10s

      # ✅ Vérification du fichier deployment.yaml avant apply
      - name: Vérifier et préparer le deployment.yaml
        run: |
          echo "=== Image avant sed ==="
          grep "image:" k8s/deployment.yaml

          sed -i "s|YOUR_DOCKER_USERNAME|${{ secrets.DOCKERHUB_USERNAME }}|g" k8s/deployment.yaml

          echo "=== Image après sed ==="
          grep "image:" k8s/deployment.yaml

          echo "=== Validation YAML (dry-run) ==="
          kubectl apply -f k8s/deployment.yaml --dry-run=client --validate=false

      # ✅ Déploiement + vérification Deployment ET Service
      - name: Déployer sur le cluster K3s
        run: |
          kubectl apply -f k8s/deployment.yaml --validate=false

          echo "=== Rollout du Deployment ==="
          kubectl rollout status deployment/flask-app --timeout=120s

          echo "=== État du Service ==="
          kubectl get service flask-app-service

          echo "=== État des Pods ==="
          kubectl get pods -l app=flask-app